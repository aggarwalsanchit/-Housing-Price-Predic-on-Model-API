version: '3.8'

services:
  ml-api:
    build: ./ml-api
    ports:
      - "8000:8000"
    networks:
      - housing-network

  nextjs-portal:
    build: ./nextjs-portal
    ports:
      - "3000:3000"
    depends_on:
      - ml-api
    networks:
      - housing-network
    environment:
      - NEXT_PUBLIC_ML_API_URL=http://ml-api:8000

networks:
  housing-network:
    driver: bridge